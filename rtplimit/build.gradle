plugins {
    id 'java'
    id 'net.neoforged.moddev' version '2.0.28'
}

version = '1.0.0'
group = 'com.rtplimit'

java {
    toolchain.languageVersion = JavaLanguageVersion.of(21)
}

neoForge {
    version = '21.1.86'

    runs {
        server {
            server()
            ideName = 'NeoForge Server'
        }
    }

    mods {
        rtplimit {
            sourceSet sourceSets.main
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
}
